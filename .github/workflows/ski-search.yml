name: Ski Accommodation Search

on:
  workflow_dispatch:
    inputs:
      check_in:
        description: "Check-in date (YYYY-MM-DD)"
        required: false
        default: ""
      check_out:
        description: "Check-out date (YYYY-MM-DD)"
        required: false
        default: ""
      max_price_pp:
        description: "Max price per person (CHF)"
        required: false
        default: ""
      resort:
        description: "Filter to a single resort (case-sensitive substring, e.g. 'Les Arcs')"
        required: false
        default: ""

  schedule:
    - cron: "0 6 * * *"  # Every day at 6am UTC

jobs:
  # ── Per-resort scrape jobs (run in parallel) ────────────────────────────────
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        resort:
          - "St. Anton am Arlberg, Austria"
          - "Ischgl, Austria"
          - "Sölden, Austria"
          - "Saalbach-Hinterglemm, Austria"
          - "Cervinia, Italy"
          - "Selva di Val Gardena, Italy"
          - "Sestriere, Italy"
          - "Madonna di Campiglio, Italy"
          - "Val Thorens, France"
          - "Les Menuires, France"
          - "Tignes, France"
          - "Val d'Isère, France"
          - "La Plagne, France"
          - "Les Arcs, France"
          - "Alpe d'Huez, France"
          - "Avoriaz, France"
          - "Chamonix, France"
          - "La Rosière, France"
    # Skip jobs that don't match the optional resort filter (case-sensitive substring)
    if: ${{ !github.event.inputs.resort || contains(matrix.resort, github.event.inputs.resort) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Override config from inputs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          INPUT_CHECK_IN: ${{ github.event.inputs.check_in }}
          INPUT_CHECK_OUT: ${{ github.event.inputs.check_out }}
          INPUT_MAX_PRICE: ${{ github.event.inputs.max_price_pp }}
        run: python scripts/apply_config_overrides.py

      - name: Scrape resort
        run: python ski_search.py --resort "${{ matrix.resort }}" --scrape-only

      - name: Compute artifact slug
        id: slug
        env:
          RESORT: ${{ matrix.resort }}
        run: |
          SLUG=$(echo "$RESORT" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-|-$//g')
          echo "name=raw-$SLUG" >> $GITHUB_OUTPUT

      - name: Upload raw scrape results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.slug.outputs.name }}
          path: raw_results.json

  # ── Merge job: geo-enrich + rank + email ────────────────────────────────────
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: search
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Override config from inputs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          INPUT_CHECK_IN: ${{ github.event.inputs.check_in }}
          INPUT_CHECK_OUT: ${{ github.event.inputs.check_out }}
          INPUT_MAX_PRICE: ${{ github.event.inputs.max_price_pp }}
        run: python scripts/apply_config_overrides.py

      - name: Download all raw scrape artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: raw-*
          path: raw-artifacts

      - name: Merge raw results
        run: |
          python3 - <<'PYEOF'
          import json, glob, sys

          files = sorted(glob.glob("raw-artifacts/*/raw_results.json"))
          if not files:
              print("No raw_results.json artifacts found — all search jobs may have failed.")
              sys.exit(1)

          all_properties = []
          all_resorts = []
          for path in files:
              with open(path) as fh:
                  data = json.load(fh)
              props = data if isinstance(data, list) else data.get("properties", [])
              all_properties.extend(props)
              if isinstance(data, dict):
                  all_resorts.extend(data.get("resorts_searched", []))
              print(f"  {path}: {len(props)} properties")

          merged = {"resorts_searched": all_resorts, "properties": all_properties}
          with open("raw_results.json", "w") as fh:
              json.dump(merged, fh, indent=2, ensure_ascii=False, default=str)
          print(f"\nMerged {len(all_properties)} properties from {len(files)} resort(s).")
          PYEOF

      - name: Run geo-enrichment, ranking and email
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python ski_search.py --from-cache raw_results.json

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ski-search-results
          path: |
            results.md
            results.csv

      - name: Post summary
        run: |
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          ARTIFACT_URL="${RUN_URL}#artifacts"

          echo "## Ski Search Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:** [results.md / results.csv](${ARTIFACT_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat results.md >> $GITHUB_STEP_SUMMARY
